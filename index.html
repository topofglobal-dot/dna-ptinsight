// ── GAS 헬퍼 ──────────────────────────────────────────
async function gasCall(action, payload={}) {
  const params = new URLSearchParams({action, data:JSON.stringify(payload), _t:Date.now()});
  const res = await fetch(`${GAS_URL}?${params.toString()}`, {
    method:"GET", redirect:"follow", cache:"no-store",
  });
  const data = await res.json();
  if(!data.ok) throw new Error(data.error||"GAS 서버 오류");
  return data.result;
}

  const siLv=lv(top.key);

  // ── 성장 팁: bot역량 × 4단계 + 실질적 행동 제안 ───────

    },
    CRE:{

      B:`브레인스토밍 노트를 만들어봐. 아이디어를 검열 없이 자유롭게 적어봐. 엉뚱한 아이디어일수록 가치가 있을 수 있어.`,

    ACT:{
      C:`'완벽한 준비' 대신 '일단 시작'을 실천해봐. 이번 주 안에 아이디어 1개를 MVP로 만들어봐. 배달의민족도 처음엔 단순한 전단지 앱이었어.`,

      A:`더 과감한 실행을 해봐. 지금 하려는 것보다 10배 빠르게 실행하면 어떨까? 린스타트업 방법론으로 더 빠른 피드백 루프를 만들어봐.`,

    NET:{

  const team_role=(TR[top.key]&&TR[top.key][top2.key])||`${top.role} — ${top.desc}`;

    RES:{S:`💪 회복력 전파 — 팀이 위기를 이겨내는 문화 만들기`,A:`📓 실패에서 배운 점을 기록하는 '성장 일지' 쓰기`,B:`🧘 규칙적 루틴 만들기 (수면·운동·식사 루틴화)`,C:`🔄 작은 실패 1개 경험하고 거기서 배운 점 찾아보기`},

  const action_items=[

        {name:"큰 그림부터 그려봐",reason:`장병규 의장은 더밀크 인터뷰에서 "창업 2년은 생존, 그다음이 보인다"고 했어. 1년 후 목표를 정하고 역산해서 이번 달 할 일 1개를 정해봐.`},
      ],
    },
  };

  // 글로벌 창업가 보완 풀 (top 역량 기반 매칭)
  const GLOBAL = [
    { key: "OPP", name: "스티브 잡스", reason: `"사람들은 자신이 원하는 것을 모른다"며 아이폰으로 존재하지 않던 시장을 창조했어. 잠재 수요를 먼저 발굴한 역대 최고의 기회탐색가야.` },
    { key: "OPP", name: "피터 틸", reason: `저서 '제로 투 원'에서 "경쟁은 패자의 전략"이라며 독점적 기회 탐색을 강조했어. 페이팔·팔란티어·페이스북 투자 모두 남들이 보지 못한 기회를 먼저 봤어.` },
    { key: "CRE", name: "일론 머스크", reason: `전기차·우주·AI를 동시에 혁신했어. 테슬라 초기 "10년 내 파산" 전망을 뒤집으며 창의적 비전을 현실로 만들었어.` },
    { key: "CRE", name: "브라이언 체스키(에어비앤비)", reason: `빈 방을 호텔로 만드는 창의적 발상으로 숙박 산업을 재정의했어. 초기 투자자에게 수백 번 거절당했지만 발상 자체가 너무 창의적이어서 결국 통했어.` },
    { key: "ACT", name: "제프 베조스", reason: `아마존 주주서한에서 매년 "우리는 여전히 창업 1일차"를 강조하며 Day 1 실행 문화를 만들었어. 수십 년간 실행을 멈추지 않은 역대 최고의 실행가야.` },
    { key: "ACT", name: "사라 블레이클리(스팩스)", reason: `팩스를 판매하던 영업사원이 스팩스를 창업해 직접 제품을 개발하고 혼자 특허를 취득했어. 실행 가능한 작은 것부터 직접 해결한 창업가야.` },
    { key: "NET", name: "리드 호프만", reason: `링크드인 창업 후 수많은 스타트업을 연결한 실리콘밸리 최고의 네트워커야. 저서 블리츠스케일링에서 네트워크 기반 성장 전략을 체계화했어.` },
    { key: "NET", name: "잭 마(알리바바)", reason: `영어 교사였던 잭 마는 중국 인터넷 생태계를 연결하는 알리바바를 만들었어. "오늘은 잔인하고, 내일은 더 잔인하지만 모레는 아름답다"는 말로 유명해.` },
    { key: "RES", name: "하워드 슐츠", reason: `스타벅스 투자 제안 217번 거절. 자서전에 기록된 사실이야. 포기하지 않고 결국 글로벌 커피 제국을 만든 회복탄력성의 아이콘이야.` },
    { key: "RES", name: "제임스 다이슨", reason: `진공청소기 5126번 프로토타입 실패 끝에 성공했어. 본인 자서전에 기록된 사실이야. "매 실패마다 배웠다"는 말이 실패를 배움으로 바꾼 회복탄력성의 상징이야.` },
    { key: "STR", name: "샘 올트먼", reason: `오픈AI를 통해 AI 시대의 판을 설계했어. 이사회 해임 5일 만에 복귀하며 전략적 판단력을 증명했어.` },
    { key: "STR", name: "젠슨 황(엔비디아)", reason: `게임용 GPU를 AI 인프라로 전환하는 30년 전략을 실행했어. 인터뷰에서 "나는 항상 1인치 앞에 파산이 있다고 생각하며 경영한다"고 밝혔어.` },
  ];
  const topFamous=(FAMOUS[top.key]&&FAMOUS[top.key][lv(top.key)])||[];
  const top2Famous=(FAMOUS[top2.key]&&FAMOUS[top2.key][lv(top2.key)])||[];
  const globalMatch=GLOBAL.find(g=>g.key===top.key)||GLOBAL[0];

  const famous_matches=[
    ...topFamous.slice(0,2),
    ...(top2Famous.filter(f=>!topFamous.find(t=>t.name===f.name)).slice(0,1)),
    {name:globalMatch.name, reason:globalMatch.reason},
    {name:avg>=70?"Y Combinator 샘 올트먼":"폴 그레이엄(PG Essays)",
     reason:avg>=70?"강한 역량으로 지금 당장 창업에 도전해봐. 준비됐어!":"'Do things that don't scale' — 지금 시작하는 것 자체가 답이야."},
  ].filter((v,i,a)=>a.findIndex(t=>t.name===v.name)===i).slice(0,5);

  return{...m, summary, strength_insight, growth_tip, team_role, action_items, famous_matches};
}

function Radar({scores,size=160}){const cx=size/2,cy=size/2,r=size/2-22,n=6;return(<svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>{[.25,.5,.75,1].map(lv=>(<polygon key={lv} fill="none" stroke="#e5e7eb" strokeWidth="0.8" points={DIMS.map((_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return`${cx+r*lv*Math.cos(a)},${cy+r*lv*Math.sin(a)}`;}).join(" ")}/>))}{DIMS.map((_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return<line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke="#e5e7eb" strokeWidth="0.8"/>;})}<polygon fill="rgba(124,58,237,0.18)" stroke="#7C3AED" strokeWidth="2" points={DIMS.map((d,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2,v=(scores[d.key]||0)/100;return`${cx+r*v*Math.cos(a)},${cy+r*v*Math.sin(a)}`;}).join(" ")}/>{DIMS.map((d,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2,v=(scores[d.key]||0)/100;return<circle key={d.key} cx={cx+r*v*Math.cos(a)} cy={cy+r*v*Math.sin(a)} r="3.5" fill={d.color}/>;})}{DIMS.map((d,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return<text key={d.key} x={cx+(r+18)*Math.cos(a)} y={cy+(r+18)*Math.sin(a)} textAnchor="middle" dominantBaseline="middle" fontSize="10" fontWeight="700" fill={d.color}>{d.emoji}</text>;})}</svg>);}
function MiniRadar({scores,size=44}){const cx=size/2,cy=size/2,r=size/2-6,n=6;return(<svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}><polygon fill="none" stroke="#e5e7eb" strokeWidth="0.8" points={DIMS.map((_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;}).join(" ")}/><polygon fill="rgba(124,58,237,0.2)" stroke="#7C3AED" strokeWidth="1.2" points={DIMS.map((d,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2,v=(scores[d.key]||0)/100;return`${cx+r*v*Math.cos(a)},${cy+r*v*Math.sin(a)}`;}).join(" ")}/></svg>);}

function SuperAdminLogin({onSuccess,onBack}){
  const [pw,setPw]=useState("");const [err,setErr]=useState(false);

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(145deg,#0f0a2e,#1e1b4b)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FF,padding:"20px"}}>

        <div style={{fontSize:"44px",marginBottom:"12px"}}>🔐</div>
        <h1 style={{margin:"0 0 24px",fontSize:"18px",fontWeight:"900"}}>슈퍼관리자 로그인</h1>
        <div style={{background:"rgba(255,255,255,0.08)",borderRadius:"16px",padding:"20px"}}>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="관리자 비밀번호" style={{width:"100%",background:"rgba(255,255,255,0.12)",border:`1.5px solid ${err?"#EF4444":"rgba(255,255,255,0.2)"}`,borderRadius:"10px",padding:"11px 14px",fontSize:"15px",color:"white",boxSizing:"border-box",outline:"none",marginBottom:"10px"}}/>
          {err&&<p style={{margin:"0 0 10px",fontSize:"14px",color:"#FCA5A5",fontWeight:"700"}}>❌ 비밀번호 오류</p>}
          <button onClick={login} style={{width:"100%",background:"linear-gradient(135deg,#7C3AED,#DB2777)",color:"white",border:"none",borderRadius:"10px",padding:"12px",fontSize:"15px",fontWeight:"800",cursor:"pointer"}}>로그인 →</button>
        </div>
      </div>
    </div>
  );
}

                    <span style={{fontSize:"14px",fontWeight:"800",color:"#1e1b4b"}}>{ev.name}</span>

function exportAllResults(students, events, title) {
  const evMap = {};
  (events||[]).forEach(e=>{ evMap[e.id]=e.name; });
  const avg = students.length ? Math.round(students.reduce((a,b)=>a+b.avg,0)/students.length) : 0;
  const dimAvgs = {};
  DIMS.forEach(d=>{ dimAvgs[d.key]=students.length?Math.round(students.reduce((a,s)=>a+(s.scores?.[d.key]||0),0)/students.length):0; });

  const radarSVG = (scores, size=120) => {
    const cx=size/2, cy=size/2, r=size/2-16, n=6;
    const rings = [.25,.5,.75,1].map(lv=>`<polygon fill="none" stroke="#e5e7eb" stroke-width="0.8" points="${DIMS.map((_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return`${cx+r*lv*Math.cos(a)},${cy+r*lv*Math.sin(a)}`;}).join(' ')}"/>`).join('');
    const axes = DIMS.map((_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="#e5e7eb" stroke-width="0.8"/>`;}).join('');
    const poly = `<polygon fill="rgba(124,58,237,0.15)" stroke="#7C3AED" stroke-width="2" points="${DIMS.map((d,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2,v=(scores[d.key]||0)/100;return`${cx+r*v*Math.cos(a)},${cy+r*v*Math.sin(a)}`;}).join(' ')}"/>`;
    const dots = DIMS.map((d,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2,v=(scores[d.key]||0)/100;return`<circle cx="${cx+r*v*Math.cos(a)}" cy="${cy+r*v*Math.sin(a)}" r="3" fill="${d.color}"/>`;}).join('');
    const labels = DIMS.map((d,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return`<text x="${cx+(r+12)*Math.cos(a)}" y="${cy+(r+12)*Math.sin(a)}" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="700" fill="${d.color}">${d.emoji}</text>`;}).join('');
    return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${rings}${axes}${poly}${dots}${labels}</svg>`;
  };

  const getLv = s => s>=80?{l:'탁월',c:'#7C3AED'}:s>=60?{l:'우수',c:'#0284C7'}:s>=40?{l:'보통',c:'#D97706'}:{l:'개발필요',c:'#DC2626'};

  const rows = students.map((s,i)=>{
    const lv=getLv(s.avg), topD=DIMS.find(d=>d.key===s.topKey)||DIMS[0];
    const evName=evMap[s.evId]||s.evId||'-';
    return `
    <div class="card">
      <div class="card-header">
        <div class="rank">${i+1}</div>
        <div class="radar">${radarSVG(s.scores||{},100)}</div>
        <div class="info">
          <div class="name-row">
            <span class="name">${s.name||'-'}</span>
            <span class="badge" style="background:${lv.c}20;color:${lv.c}">${lv.l}</span>
            <span class="badge2">${topD.emoji} ${topD.label}</span>
          </div>
          <div class="meta">${s.major?`전공: ${s.major} · `:''}${s.team?`팀: ${s.team} · `:''}행사: ${evName} · ${s.date||''}</div>
          <div class="dims">
            ${DIMS.map(d=>{const v=s.scores?.[d.key]||0,lv2=getLv(v);return`
            <div class="dim-row">
              <span class="dim-label">${d.emoji} ${d.label}</span>
              <div class="bar-wrap"><div class="bar" style="width:${v}%;background:${d.color}"></div></div>
              <span class="dim-score" style="color:${d.color}">${v}</span>
              <span class="dim-lv" style="color:${lv2.c}">${lv2.l}</span>
            </div>`;}).join('')}
          </div>
        </div>
        <div class="score">${s.avg}</div>
      </div>
    </div>`;
  }).join('');

  const html = `<!DOCTYPE html>

  .name{font-size:17px;font-weight:900;line-height:1.3;letter-spacing:-0.3px}
  .badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;line-height:1.5}

                ctx.fillStyle='white'; ctx.font='bold 26px system-ui';
                ctx.fillText(aiResult.type,20,130);
                ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='16px system-ui';
                ctx.fillText(`"${aiResult.tagline}"`,20,158);
                // 점수
                ctx.fillStyle='#a78bfa'; ctx.font='bold 64px system-ui';
                ctx.fillText(`${avg2}`,20,248);
                ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='16px system-ui';
                ctx.fillText('종합 점수',20,272);
                // 등급
                ctx.fillStyle=lv2.c; ctx.font='bold 22px system-ui';
                ctx.fillText(lv2.l,120,248);
                ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='15px system-ui';
                ctx.fillText('역량 등급',120,272);
                // 역량 바
                const barY=300; const barH=8; const barW=560/6-8;
                DIMS.forEach((d,i)=>{
                  const x=20+i*(barW+8);
                  const v=(scores[d.key]||0)/100;
                  ctx.fillStyle='rgba(255,255,255,0.1)';
                  ctx.beginPath(); ctx.roundRect(x,barY,barW,barH,4); ctx.fill();
                  ctx.fillStyle=d.color;
                  ctx.beginPath(); ctx.roundRect(x,barY,barW*v,barH,4); ctx.fill();
                  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='10px system-ui';
                  ctx.fillText(d.emoji,x+barW/2-6,barY+26);
                  ctx.fillStyle='white'; ctx.font='bold 11px system-ui';
                  ctx.fillText(scores[d.key]||0,x+barW/2-8,barY+42);
                });
                // CTA
                ctx.fillStyle='rgba(255,255,255,0.15)';
                ctx.beginPath(); ctx.roundRect(20,365,560,24,8); ctx.fill();
                ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='12px system-ui';
                ctx.fillText('👇 나도 창업 DNA 진단해보기  →  topofglobal-dot.github.io/dna-ptinsight',36,381);
                // 이미지로 변환
                canvas.toBlob(async blob=>{
                  if(!blob) return;
                  const file=new File([blob],`창업DNA_${info.name}.png`,{type:'image/png'});
                  if(navigator.canShare&&navigator.canShare({files:[file]})){
                    await navigator.share({
                      title:`${info.name}님의 창업 DNA 진단 결과`,
                      text:`🧬 ${aiResult.type}\n"${aiResult.tagline}"\n📊 종합 점수: ${avg2}점`,
                      files:[file],
                      url: window.location.href
                    }).catch(()=>{});
                  } else {
                    // 파일 공유 불가시 텍스트만 공유
                    navigator.share({
                      title:`${info.name}님의 창업 DNA 진단 결과`,
                      text:`🧬 ${aiResult.type}\n"${aiResult.tagline}"\n📊 종합 점수: ${avg2}점`,
                      url: window.location.href
                    }).catch(()=>{});
                  }
                },'image/png');
              } catch(e){
                // 실패 시 기본 공유
                navigator.share({title:`창업 DNA 결과`,text:`${info.name} · ${aiResult.type} · ${avg2}점`,url:window.location.href}).catch(()=>{});
              }
            };
            if(isMobile&&navigator.share){
              return(
                <button onClick={shareAsImage} className="no-print" style={{width:"100%",background:"linear-gradient(135deg,#059669,#0284C7)",color:"white",border:"none",borderRadius:"50px",padding:"13px",fontSize:"15px",fontWeight:"800",cursor:"pointer"}}>
                  🖼️ 결과 이미지로 공유하기
                </button>
              );
            } else {
              return(
                <button onClick={()=>window.print()} className="no-print" style={{width:"100%",background:"linear-gradient(135deg,#059669,#0284C7)",color:"white",border:"none",borderRadius:"50px",padding:"13px",fontSize:"15px",fontWeight:"800",cursor:"pointer"}}>
                  📄 결과 PDF 저장
                </button>
              );
            }
          })()}
          <button onClick={restart} className="no-print" style={{width:"100%",background:"linear-gradient(135deg,#7C3AED,#DB2777)",color:"white",border:"none",borderRadius:"50px",padding:"13px",fontSize:"15px",fontWeight:"800",cursor:"pointer"}}>🔄 다시 진단하기</button>
          <button onClick={onBack} className="no-print" style={{width:"100%",background:"white",color:"#6B7280",border:"1.5px solid #e5e7eb",borderRadius:"50px",padding:"11px",fontSize:"15px",fontWeight:"700",cursor:"pointer"}}>← 홈으로</button>
        </div>
      </div>
    );
  }

  if(screen==="refused") return(
    <div style={{minHeight:"100vh",background:"linear-gradient(145deg,#0f0a2e,#1e1b4b)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FF,padding:"20px"}}>
      <div style={{maxWidth:"360px",width:"100%",textAlign:"center",color:"white"}}>
        <div style={{fontSize:"52px",marginBottom:"16px"}}>🙏</div>
        <h2 style={{margin:"0 0 10px",fontSize:"20px",fontWeight:"900"}}>동의하지 않으셨어요</h2>
        <p style={{margin:"0 0 28px",fontSize:"15px",opacity:.7,lineHeight:1.7}}>개인정보 수집에 동의하지 않으시면<br/>진단 결과를 확인할 수 없어요.</p>
        <button onClick={restart} style={{width:"100%",background:"linear-gradient(135deg,#7C3AED,#DB2777)",color:"white",border:"none",borderRadius:"50px",padding:"13px",fontSize:"15px",fontWeight:"800",cursor:"pointer",marginBottom:"10px"}}>🔄 다시 시도하기</button>
        <button onClick={onBack} style={{width:"100%",background:"rgba(255,255,255,0.1)",color:"white",border:"1px solid rgba(255,255,255,0.2)",borderRadius:"50px",padding:"11px",fontSize:"15px",fontWeight:"700",cursor:"pointer"}}>← 홈으로</button>
      </div>
    </div>
  );

  const q=QUESTIONS[cur],dim=DIMS.find(d=>d.key===q.dim),prog=cur/QUESTIONS.length*100;
  return(
    <div style={{minHeight:"100vh",background:"#f5f3ff",fontFamily:FF,padding:"20px 16px"}}>
      <style>{`.scbtn{cursor:pointer;border:none;background:none;transition:all .15s}.scbtn:active{transform:scale(0.97)}@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}.qw{animation:slideUp .25s ease}`}</style>
      <div style={{maxWidth:"420px",margin:"0 auto"}}>
        <div style={{marginBottom:"14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              {cur>0&&<button onClick={handleBack} style={{background:"rgba(124,58,237,0.1)",border:"none",borderRadius:"8px",padding:"5px 10px",fontSize:"13px",fontWeight:"800",color:"#7C3AED",cursor:"pointer"}}>← 이전</button>}
              <span>{dim.emoji}</span><span style={{fontSize:"14px",fontWeight:"800",color:dim.color}}>{dim.label}</span>
            </div>
            <span style={{fontSize:"13px",color:"#9CA3AF",fontWeight:"700"}}>{cur+1}/{QUESTIONS.length}</span>
          </div>
          <div style={{background:"#e5e7eb",borderRadius:"100px",height:"6px",overflow:"hidden"}}><div style={{background:"linear-gradient(90deg,#7C3AED,#DB2777)",height:"6px",width:`${prog}%`,borderRadius:"100px",transition:"width .4s ease"}}/></div>
        </div>
        <div key={cur} className="qw" style={{background:"white",borderRadius:"20px",padding:"22px 18px",marginBottom:"12px",boxShadow:"0 4px 20px rgba(0,0,0,0.07)"}}>
          <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"10px"}}><span style={{fontSize:"13px",fontWeight:"800",color:dim.color,background:`${dim.color}15`,padding:"3px 10px",borderRadius:"20px"}}>{dim.label}</span><span style={{fontSize:"13px",color:"#9CA3AF"}}>{q.sub}</span></div>
          <h2 style={{margin:0,fontSize:"17px",fontWeight:"900",lineHeight:1.5,color:"#111"}}>Q{cur+1}. {q.text}</h2>
        </div>
        <div style={{background:"white",borderRadius:"16px",padding:"14px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
          <p style={{margin:"0 0 10px",fontSize:"13px",fontWeight:"700",color:"#9CA3AF",textAlign:"center"}}>나에게 얼마나 해당되나요?</p>
          {LABELS.map((lbl,i)=>(<button key={i} className="scbtn" onClick={()=>handleAnswer(i+1)} style={{padding:"12px 14px",borderRadius:"11px",width:"100%",textAlign:"left",display:"flex",alignItems:"center",gap:"10px",marginBottom:i<4?"7px":0,background:"#f8f7ff",color:"#374151",fontWeight:"700",fontSize:"15px"}}><span style={{width:"24px",height:"24px",borderRadius:"50%",background:"rgba(0,0,0,0.05)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",fontWeight:"900",flexShrink:0,color:dim.color}}>{i+1}</span>{lbl}</button>))}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  🏠 앱 루트
// ══════════════════════════════════════════════════════
function App(){
  const [mode,setMode]=useState(()=>{
    // URL 해시에 결과 데이터가 있으면 participant 모드로 시작
    if(window.location.hash.startsWith('#r=')) return "participant";
    return "landing";
  });
  const [subAccount,setSubAccount]=useState(null);
  const [superAuthed,setSuperAuthed]=useState(false);
  const goHome=()=>{setMode("landing");setSubAccount(null);setSuperAuthed(false);window.location.hash='';};
  if(mode==="participant")  return <ParticipantMode onBack={goHome}/>;
  if(mode==="sublogin")     return <SubAdminLogin onSuccess={acc=>{setSubAccount(acc);setMode("subdash");}} onBack={goHome}/>;
  if(mode==="subdash"&&subAccount) return <SubAdminDashboard account={subAccount} onBack={goHome}/>;
  if(mode==="superlogin")   return <SuperAdminLogin onSuccess={()=>{setSuperAuthed(true);setMode("superdash");}} onBack={goHome}/>;
  if(mode==="superdash"&&superAuthed) return <SuperAdminDashboard onBack={goHome}/>;
  return <LandingPage onSubLogin={()=>setMode("sublogin")} onSuperLogin={()=>setMode("superlogin")} onParticipant={()=>setMode("participant")}/>;
}

const rootEl = document.getElementById('root');
const loader = document.getElementById('init-loader');
ReactDOM.createRoot(rootEl).render(<App/>);
// 렌더 완료 후 스피너 제거
requestAnimationFrame(()=>{
  setTimeout(()=>{
    if(loader) loader.style.opacity='0';
    setTimeout(()=>{ if(loader) loader.remove(); },400);
  },100);
});
</script>
</body>
</html>

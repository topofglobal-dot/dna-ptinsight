// ── GAS 헬퍼 ──────────────────────────────────────────
async function gasCall(action, payload={}) {
  const res = await fetch(`${GAS_URL}?action=${action}`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload),
  });
  const data = await res.json();
  if(!data.ok) throw new Error(data.error||"GAS 서버 오류");
  return data.result;
}

function calcScores(ans){const t={},c={};DIMS.forEach(d=>{t[d.key]=0;c[d.key]=0;});ans.forEach((v,i)=>{t[QUESTIONS[i].dim]+=v;c[QUESTIONS[i].dim]++;});const s={};DIMS.forEach(d=>{s[d.key]=Math.round((t[d.key]/c[d.key]/5)*100);});return s;}
function getLevel(s){if(s>=80)return{l:"탁월",c:"#7C3AED",bg:"#f5f3ff"};if(s>=60)return{l:"우수",c:"#0284C7",bg:"#eff6ff"};if(s>=40)return{l:"보통",c:"#D97706",bg:"#fffbeb"};return{l:"개발필요",c:"#DC2626",bg:"#fef2f2"};}
function makeFallback(sc,name){const sorted=[...DIMS].sort((a,b)=>sc[b.key]-sc[a.key]);const avg=Math.round(Object.values(sc).reduce((a,b)=>a+b,0)/6);const top=sorted[0],bot=sorted[sorted.length-1];const m=avg>=80?{type:"🚀 창업 선도자",tagline:"이미 창업가의 DNA를 갖추고 있어!"}:avg>=60?{type:"💡 성장형 혁신가",tagline:"아이디어를 현실로 만드는 힘이 있어!"}:avg>=40?{type:"🌱 잠재력 발굴자",tagline:"씨앗은 준비됐어, 이제 물을 줄 차례!"}:{type:"🔰 도전 준비생",tagline:"지금 시작이 미래를 만들어!"};return{...m,summary:`${name}은 ${top.label} 역량이 가장 두드러져요(${sc[top.key]}점). 전체 평균 ${avg}점으로 ${avg>=60?"탄탄한 기반을 갖추고 있어요":"성장 가능성이 충분한 단계예요"}. ${bot.label}(${sc[bot.key]}점) 영역을 집중 개발하면 훨씬 강한 창업가로 성장할 수 있어요!`,strength_insight:"강점을 살려 창업 커뮤니티에서 바로 적용해봐.",growth_tip:"부족한 역량은 작은 습관부터 차근차근 키워봐.",team_role:`${top.role} — ${top.desc}`,action_items:["🔍 강점 활용 — 지금 바로 한 가지 실행해봐","⚡ 약점 보완 — 오늘부터 작은 습관 만들기","♟️ 이번 주 목표를 한 줄로 정의하기"],famous_matches:[{name:"토스 이승건",reason:"사용자 중심 사고의 실행가"},{name:"카카오 김범수",reason:"기회 인식과 네트워크의 달인"},{name:"배달의민족 김봉진",reason:"꾸준한 역량 개발로 성공"},{name:"당근 김용현",reason:"로컬 인사이트를 플랫폼으로"},{name:"무신사 조만호",reason:"작은 시작에서 시장 창출"}]};}

function Radar({scores,size=160}){const cx=size/2,cy=size/2,r=size/2-22,n=6;return(<svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>{[.25,.5,.75,1].map(lv=>(<polygon key={lv} fill="none" stroke="#e5e7eb" strokeWidth="0.8" points={DIMS.map((_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return`${cx+r*lv*Math.cos(a)},${cy+r*lv*Math.sin(a)}`;}).join(" ")}/>))}{DIMS.map((_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return<line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke="#e5e7eb" strokeWidth="0.8"/>;})}<polygon fill="rgba(124,58,237,0.18)" stroke="#7C3AED" strokeWidth="2" points={DIMS.map((d,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2,v=(scores[d.key]||0)/100;return`${cx+r*v*Math.cos(a)},${cy+r*v*Math.sin(a)}`;}).join(" ")}/>{DIMS.map((d,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2,v=(scores[d.key]||0)/100;return<circle key={d.key} cx={cx+r*v*Math.cos(a)} cy={cy+r*v*Math.sin(a)} r="3.5" fill={d.color}/>;})}{DIMS.map((d,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return<text key={d.key} x={cx+(r+18)*Math.cos(a)} y={cy+(r+18)*Math.sin(a)} textAnchor="middle" dominantBaseline="middle" fontSize="10" fontWeight="700" fill={d.color}>{d.emoji}</text>;})}</svg>);}
function MiniRadar({scores,size=44}){const cx=size/2,cy=size/2,r=size/2-6,n=6;return(<svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}><polygon fill="none" stroke="#e5e7eb" strokeWidth="0.8" points={DIMS.map((_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;}).join(" ")}/><polygon fill="rgba(124,58,237,0.2)" stroke="#7C3AED" strokeWidth="1.2" points={DIMS.map((d,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2,v=(scores[d.key]||0)/100;return`${cx+r*v*Math.cos(a)},${cy+r*v*Math.sin(a)}`;}).join(" ")}/></svg>);}

function SubAdminLogin({onSuccess,onBack}){
  const [mode,setMode]=useState("code");

        <div style={{textAlign:"center",marginBottom:"28px"}}><div style={{fontSize:"44px",marginBottom:"10px"}}>🏫</div><h1 style={{margin:"0 0 4px",fontSize:"20px",fontWeight:"900"}}>기관 담당자 로그인</h1></div>

          {mode==="email"&&(<><div style={{marginBottom:"16px"}}><label style={{fontSize:"13px",fontWeight:"700",opacity:.6,display:"block",marginBottom:"5px"}}>등록 이메일</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&loginByEmail()} placeholder="신청 시 등록한 이메일" style={{width:"100%",background:"rgba(255,255,255,0.12)",border:"1.5px solid rgba(255,255,255,0.2)",borderRadius:"10px",padding:"11px 14px",fontSize:"15px",color:"white",boxSizing:"border-box",outline:"none"}}/></div><button onClick={loginByEmail} style={{width:"100%",background:"linear-gradient(135deg,#7C3AED,#DB2777)",color:"white",border:"none",borderRadius:"10px",padding:"13px",fontSize:"15px",fontWeight:"900",cursor:"pointer"}}>{loading?"⏳ 확인 중...":"이메일로 로그인 →"}</button></>)}
          {mode==="shared"&&(<><div style={{marginBottom:"16px"}}><label style={{fontSize:"13px",fontWeight:"700",opacity:.6,display:"block",marginBottom:"5px"}}>공유 접속 코드</label><input value={shared} onChange={e=>setShared(e.target.value)} onKeyDown={e=>e.key==="Enter"&&loginByShared()} placeholder="안내받은 공유 코드" style={{width:"100%",background:"rgba(255,255,255,0.12)",border:"1.5px solid rgba(255,255,255,0.2)",borderRadius:"10px",padding:"11px 14px",fontSize:"15px",color:"white",boxSizing:"border-box",outline:"none",letterSpacing:"3px"}}/></div><button onClick={loginByShared} style={{width:"100%",background:"linear-gradient(135deg,#7C3AED,#DB2777)",color:"white",border:"none",borderRadius:"10px",padding:"13px",fontSize:"15px",fontWeight:"900",cursor:"pointer"}}>{loading?"⏳ 확인 중...":"접속 →"}</button></>)}

function ParticipantMode({onBack}){
  const [screen,setScreen]=useState("info");

  useEffect(()=>{
    Promise.all([db.evList(null,"b2b"),db.evGetActiveList(),db.evGetDirectActiveList()])
      .then(([b2bEvs,b2bActive,directActive])=>{
        const all=[...(b2bEvs||[]),...(directActive||[])];

        const ids=[...(b2bActive||[]).map(e=>e.id),...(directActive||[]).map(e=>e.id)];

  const getEvMode=()=>events.find(e=>e.id===selEvId)?.mode||"b2b";

    setScreen("loading");setLoadProgress(0);setLoadStage(0);
    let prog=0;
    const iv=setInterval(()=>{prog=Math.min(prog+Math.random()*2+0.8,92);setLoadProgress(Math.round(prog));setLoadStage(prog<25?0:prog<52?1:prog<78?2:3);},120);
    const done=async(result)=>{clearInterval(iv);setLoadProgress(100);await delay(400);setAiResult(result);setScreen("result");};
    const avg=Math.round(Object.values(sc).reduce((a,b)=>a+b,0)/6);
    try{
      const messages=[{role:"user",content:`창업 역량 진단. 20대 대학생 공감 톤, 반말체.\n이름:${info.name}/전공:${info.major}/팀:${info.team}\n평균:${avg}점 / ${DIMS.map(d=>`${d.label} ${sc[d.key]}`).join(" | ")}\n\nJSON만(마크다운없이):{"type":"유형(이모지포함)","tagline":"한줄","summary":"3문장","strength_insight":"2문장","growth_tip":"2문장","team_role":"포지션","action_items":["강점활용1","약점보완1","약점보완2"],"famous_matches":[{"name":"창업가","reason":"이유"},{"name":"창업가","reason":"이유"},{"name":"창업가","reason":"이유"},{"name":"창업가","reason":"이유"},{"name":"창업가","reason":"이유"}]}`}];
      const data=await db.claudeProxy(messages,1200);
      if(data){const text=data.content?.map(c=>c.text||"").join("").trim();await done(JSON.parse(text));}
      else await done(makeFallback(sc,info.name));
    }catch(e){await done(makeFallback(sc,info.name));}
  };

  const handleAnswer=val=>{
    const na=[...answers,val];setAnswers(na);
    if(na.length===QUESTIONS.length){
      const sc=calcScores(na);const avg=Math.round(Object.values(sc).reduce((a,b)=>a+b,0)/6);
      setScores(sc);
      db.resultSave({name:info.name,major:info.major,team:info.team,scores:sc,avg,date:new Date().toLocaleDateString("ko-KR")},selEvId,getEvMode()).catch(()=>{});
      setShowPrivacy(true);
    } else setCur(cur+1);
  };
  const handleBack=()=>{if(cur===0)return;setCur(cur-1);setAnswers(prev=>prev.slice(0,-1));};
  const restart=()=>{setScreen("info");setCur(0);setAnswers([]);setScores(null);setAiResult(null);setLoadProgress(0);setLoadStage(0);setInfo({name:"",major:"",team:""});setShowPrivacy(false);};

            <div style={{display:"flex",gap:"8px"}}>

  if(screen==="loading"){
    const stages=[{label:"역량 데이터 분석 중",emoji:"🧬"},{label:"6개 영역 점수 계산 중",emoji:"📊"},{label:"AI 유형 진단 중",emoji:"🤖"},{label:"맞춤 피드백 생성 중",emoji:"✨"}];
    const cs=stages[loadStage]||stages[3];
    return(<div style={{minHeight:"100vh",background:"linear-gradient(145deg,#0f0a2e,#1e1b4b)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FF}}><style>{`@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.5}}`}</style><div style={{textAlign:"center",color:"white",width:"100%",maxWidth:"300px",padding:"20px"}}><div style={{fontSize:"48px",marginBottom:"16px",animation:"pulse2 1.4s ease-in-out infinite"}}>{cs.emoji}</div><p style={{fontSize:"16px",fontWeight:"800",margin:"0 0 4px"}}>{cs.label}...</p><p style={{fontSize:"13px",opacity:.5,margin:"0 0 24px"}}>{info.name}님의 창업 DNA 분석 중</p><div style={{background:"rgba(255,255,255,0.15)",borderRadius:"100px",height:"9px",overflow:"hidden",marginBottom:"8px"}}><div style={{height:"9px",borderRadius:"100px",background:"linear-gradient(90deg,#7C3AED,#DB2777,#f59e0b)",width:`${loadProgress}%`,transition:"width .15s linear"}}/></div><div style={{fontSize:"18px",fontWeight:"900"}}>{loadProgress}<span style={{fontSize:"13px",opacity:.7}}>%</span></div></div></div>);
  }

  if(screen==="result"&&scores&&aiResult){
    const sorted=[...DIMS].sort((a,b)=>scores[b.key]-scores[a.key]);
    const avg=Math.round(Object.values(scores).reduce((a,b)=>a+b,0)/6);const lv=getLevel(avg);
    return(
      <div style={{minHeight:"100vh",background:"#f5f3ff",fontFamily:FF,padding:"20px 16px 48px"}}>
        <div style={{maxWidth:"420px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"14px"}}>
          <div style={{background:"linear-gradient(145deg,#0f0a2e,#4c1d95)",borderRadius:"24px",padding:"24px 20px",textAlign:"center",color:"white"}}>
            <div style={{fontSize:"24px",fontWeight:"900",marginBottom:"4px"}}>{aiResult.type}</div>
            <div style={{fontSize:"14px",opacity:.8,marginBottom:"16px"}}>{aiResult.tagline}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
              <div style={{background:"rgba(255,255,255,0.12)",borderRadius:"12px",padding:"12px"}}><div style={{fontSize:"26px",fontWeight:"900"}}>{avg}</div><div style={{fontSize:"13px",opacity:.6}}>종합 점수</div></div>
              <div style={{background:"rgba(255,255,255,0.12)",borderRadius:"12px",padding:"12px"}}><div style={{fontSize:"15px",fontWeight:"800",background:lv.bg,color:lv.c,borderRadius:"8px",padding:"2px 8px",display:"inline-block"}}>{lv.l}</div><div style={{fontSize:"13px",opacity:.6,marginTop:"4px"}}>{info.name}</div></div>
            </div>
          </div>
          <div style={CARD}><h3 style={{margin:"0 0 12px",fontSize:"15px",fontWeight:"800",color:"#1e1b4b"}}>📊 역량 차트</h3>
            <div style={{display:"flex",justifyContent:"center",marginBottom:"12px"}}><Radar scores={scores} size={150}/></div>
            {sorted.map(d=>{const lv2=getLevel(scores[d.key]);return(<div key={d.key} style={{marginBottom:"9px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}><span style={{fontSize:"14px",fontWeight:"700"}}>{d.emoji} {d.label}</span><div style={{display:"flex",gap:"5px",alignItems:"center"}}><span style={{fontSize:"12px",background:lv2.bg,color:lv2.c,fontWeight:"700",padding:"1px 6px",borderRadius:"20px"}}>{lv2.l}</span><span style={{fontSize:"15px",fontWeight:"900",color:d.color}}>{scores[d.key]}</span></div></div><div style={{background:"#f3f4f6",borderRadius:"100px",height:"6px"}}><div style={{background:d.color,height:"6px",width:`${scores[d.key]}%`,borderRadius:"100px"}}/></div></div>);})}
          </div>
          <div style={{background:"linear-gradient(135deg,#ede9fe,#fce7f3)",borderRadius:"20px",padding:"18px"}}><h3 style={{margin:"0 0 8px",fontSize:"15px",fontWeight:"800",color:"#1e1b4b"}}>✨ 역량 분석</h3><p style={{margin:0,fontSize:"15px",lineHeight:1.8,color:"#374151"}}>{aiResult.summary}</p></div>
          <div style={{background:"linear-gradient(135deg,#0f0a2e,#4c1d95)",borderRadius:"16px",padding:"14px",color:"white"}}><p style={{margin:"0 0 4px",fontSize:"13px",opacity:.7}}>🎯 최적 팀 포지션</p><p style={{margin:0,fontSize:"15px",fontWeight:"900"}}>{aiResult.team_role}</p></div>
          <div style={CARD}><p style={{margin:"0 0 12px",fontSize:"15px",fontWeight:"800",color:"#1e1b4b"}}>⚡ 지금 당장 해볼 것 3가지</p>
            {(aiResult.action_items||[]).map((a,i)=><div key={i} style={{display:"flex",gap:"9px",alignItems:"flex-start",marginBottom:i<2?"10px":0}}><div style={{width:"22px",height:"22px",borderRadius:"50%",background:"linear-gradient(135deg,#7C3AED,#DB2777)",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:"900",flexShrink:0}}>{i+1}</div><span style={{fontSize:"15px",lineHeight:1.6,color:"#374151"}}>{a}</span></div>)}
          </div>
          <div style={CARD}><p style={{margin:"0 0 10px",fontSize:"15px",fontWeight:"800",color:"#1e1b4b"}}>🌟 나와 비슷한 창업가</p>
            {(aiResult.famous_matches||[]).map((item,i)=><div key={i} style={{display:"flex",gap:"9px",alignItems:"flex-start",padding:"9px 11px",background:i%2===0?"#fafafa":"#f5f3ff",borderRadius:"10px",marginBottom:i<4?"7px":0}}><div style={{width:"22px",height:"22px",borderRadius:"50%",background:"linear-gradient(135deg,#7C3AED,#DB2777)",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",fontWeight:"900",flexShrink:0}}>{i+1}</div><div><div style={{fontSize:"14px",fontWeight:"900",color:"#1e1b4b",marginBottom:"2px"}}>{item.name}</div>{item.reason&&<div style={{fontSize:"12px",color:"#6B7280"}}>{item.reason}</div>}</div></div>)}
          </div>
          <button onClick={restart} style={{width:"100%",background:"linear-gradient(135deg,#7C3AED,#DB2777)",color:"white",border:"none",borderRadius:"50px",padding:"13px",fontSize:"15px",fontWeight:"800",cursor:"pointer"}}>🔄 다시 진단하기</button>
          <button onClick={onBack} style={{width:"100%",background:"white",color:"#6B7280",border:"1.5px solid #e5e7eb",borderRadius:"50px",padding:"11px",fontSize:"15px",fontWeight:"700",cursor:"pointer"}}>← 홈으로</button>
        </div>
      </div>
    );
  }

  const q=QUESTIONS[cur],dim=DIMS.find(d=>d.key===q.dim),prog=cur/QUESTIONS.length*100;
  return(
    <div style={{minHeight:"100vh",background:"#f5f3ff",fontFamily:FF,padding:"20px 16px"}}>
      <style>{`.scbtn{cursor:pointer;border:none;background:none;transition:all .15s}.scbtn:active{transform:scale(0.97)}@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}.qw{animation:slideUp .25s ease}`}</style>
      <div style={{maxWidth:"420px",margin:"0 auto"}}>
        <div style={{marginBottom:"14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              {cur>0&&<button onClick={handleBack} style={{background:"rgba(124,58,237,0.1)",border:"none",borderRadius:"8px",padding:"5px 10px",fontSize:"13px",fontWeight:"800",color:"#7C3AED",cursor:"pointer"}}>← 이전</button>}
              <span>{dim.emoji}</span><span style={{fontSize:"14px",fontWeight:"800",color:dim.color}}>{dim.label}</span>
            </div>
            <span style={{fontSize:"13px",color:"#9CA3AF",fontWeight:"700"}}>{cur+1}/{QUESTIONS.length}</span>
          </div>
          <div style={{background:"#e5e7eb",borderRadius:"100px",height:"6px",overflow:"hidden"}}><div style={{background:"linear-gradient(90deg,#7C3AED,#DB2777)",height:"6px",width:`${prog}%`,borderRadius:"100px",transition:"width .4s ease"}}/></div>
        </div>
        <div key={cur} className="qw" style={{background:"white",borderRadius:"20px",padding:"22px 18px",marginBottom:"12px",boxShadow:"0 4px 20px rgba(0,0,0,0.07)"}}>
          <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"10px"}}><span style={{fontSize:"13px",fontWeight:"800",color:dim.color,background:`${dim.color}15`,padding:"3px 10px",borderRadius:"20px"}}>{dim.label}</span><span style={{fontSize:"13px",color:"#9CA3AF"}}>{q.sub}</span></div>
          <h2 style={{margin:0,fontSize:"17px",fontWeight:"900",lineHeight:1.5,color:"#111"}}>Q{cur+1}. {q.text}</h2>
        </div>
        <div style={{background:"white",borderRadius:"16px",padding:"14px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
          <p style={{margin:"0 0 10px",fontSize:"13px",fontWeight:"700",color:"#9CA3AF",textAlign:"center"}}>나에게 얼마나 해당되나요?</p>
          {LABELS.map((lbl,i)=>(<button key={i} className="scbtn" onClick={()=>handleAnswer(i+1)} style={{padding:"12px 14px",borderRadius:"11px",width:"100%",textAlign:"left",display:"flex",alignItems:"center",gap:"10px",marginBottom:i<4?"7px":0,background:"#f8f7ff",color:"#374151",fontWeight:"700",fontSize:"15px"}}><span style={{width:"24px",height:"24px",borderRadius:"50%",background:"rgba(0,0,0,0.05)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",fontWeight:"900",flexShrink:0,color:dim.color}}>{i+1}</span>{lbl}</button>))}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  🏠 앱 루트
// ══════════════════════════════════════════════════════
function App(){
  const [mode,setMode]=useState("landing");
  const [subAccount,setSubAccount]=useState(null);
  const [superAuthed,setSuperAuthed]=useState(false);
  const goHome=()=>{setMode("landing");setSubAccount(null);setSuperAuthed(false);};
  if(mode==="participant")  return <ParticipantMode onBack={goHome}/>;
  if(mode==="sublogin")     return <SubAdminLogin onSuccess={acc=>{setSubAccount(acc);setMode("subdash");}} onBack={goHome}/>;
  if(mode==="subdash"&&subAccount) return <SubAdminDashboard account={subAccount} onBack={goHome}/>;
  if(mode==="superlogin")   return <SuperAdminLogin onSuccess={()=>{setSuperAuthed(true);setMode("superdash");}} onBack={goHome}/>;
  if(mode==="superdash"&&superAuthed) return <SuperAdminDashboard onBack={goHome}/>;
  return <LandingPage onSubLogin={()=>setMode("sublogin")} onSuperLogin={()=>setMode("superlogin")} onParticipant={()=>setMode("participant")}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
